spring:
  application:
    name: tgclone
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:h2:mem:tgclone;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${APP_DATASOURCE_USERNAME:sa}
    password: ${APP_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  task:
    scheduling:
      pool:
        size: 1
  servlet:
    multipart:
      max-file-size: ${APP_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${APP_MULTIPART_MAX_REQUEST_SIZE:40MB}

server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8080}
  shutdown: graceful

app:
  auth:
    default-tenant-key: ${APP_DEFAULT_TENANT_KEY:main}
    api-token-ttl-days: ${APP_API_TOKEN_TTL_DAYS:365}
    master-token: ${APP_AUTH_MASTER_TOKEN:}
    master-token-username: ${APP_AUTH_MASTER_TOKEN_USERNAME:local_admin}
    master-token-display-name: ${APP_AUTH_MASTER_TOKEN_DISPLAY_NAME:Local Admin}
  conversations:
    invite-ttl-hours: ${APP_CONVERSATIONS_INVITE_TTL_HOURS:168}
  media:
    storage-root: ${APP_MEDIA_STORAGE_ROOT:./data/media}
    max-file-size-bytes: ${APP_MEDIA_MAX_FILE_SIZE_BYTES:20971520}
    storage-provider: ${APP_MEDIA_STORAGE_PROVIDER:local}
    s3-endpoint: ${APP_MEDIA_S3_ENDPOINT:${APP_MEDIA_R2_ENDPOINT:}}
    s3-bucket: ${APP_MEDIA_S3_BUCKET:${APP_MEDIA_R2_BUCKET:}}
    s3-access-key-id: ${APP_MEDIA_S3_ACCESS_KEY_ID:${APP_MEDIA_R2_ACCESS_KEY_ID:}}
    s3-secret-access-key: ${APP_MEDIA_S3_SECRET_ACCESS_KEY:${APP_MEDIA_R2_SECRET_ACCESS_KEY:}}
    s3-region: ${APP_MEDIA_S3_REGION:${APP_MEDIA_R2_REGION:}}
    s3-signed-url-ttl-seconds: ${APP_MEDIA_S3_SIGNED_URL_TTL_SECONDS:900}

management:
  endpoints:
    web:
      exposure:
        include: health,info

telegram:
  enabled: ${TELEGRAM_ENABLED:false}
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  bot-username: ${TELEGRAM_BOT_USERNAME:}
  poll-timeout-seconds: ${TELEGRAM_POLL_TIMEOUT_SECONDS:25}

logging:
  level:
    com.vladislav.tgclone: INFO

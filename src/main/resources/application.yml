spring:
  application:
    name: tgclone
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:h2:file:./data/h2/tgclone;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${APP_DATASOURCE_USERNAME:sa}
    password: ${APP_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${APP_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${APP_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      connection-timeout: ${APP_DATASOURCE_HIKARI_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${APP_DATASOURCE_HIKARI_VALIDATION_TIMEOUT_MS:5000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  task:
    scheduling:
      pool:
        size: 1
  servlet:
    multipart:
      max-file-size: ${APP_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${APP_MULTIPART_MAX_REQUEST_SIZE:40MB}

server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8080}
  shutdown: graceful

app:
  auth:
    default-tenant-key: ${APP_DEFAULT_TENANT_KEY:main}
    api-token-ttl-days: ${APP_API_TOKEN_TTL_DAYS:365}
    access-token-ttl-minutes: ${APP_AUTH_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${APP_AUTH_REFRESH_TOKEN_TTL_DAYS:30}
    refresh-cookie-name: ${APP_AUTH_REFRESH_COOKIE_NAME:tgclone_refresh_token}
    master-token: ${APP_AUTH_MASTER_TOKEN:}
    master-token-username: ${APP_AUTH_MASTER_TOKEN_USERNAME:local_admin}
    master-token-display-name: ${APP_AUTH_MASTER_TOKEN_DISPLAY_NAME:Local Admin}
  conversations:
    invite-ttl-hours: ${APP_CONVERSATIONS_INVITE_TTL_HOURS:168}
  media:
    storage-root: ${APP_MEDIA_STORAGE_ROOT:./data/media}
    max-file-size-bytes: ${APP_MEDIA_MAX_FILE_SIZE_BYTES:20971520}
    storage-provider: ${APP_MEDIA_STORAGE_PROVIDER:local}
    s3-endpoint: ${APP_MEDIA_S3_ENDPOINT:${APP_MEDIA_R2_ENDPOINT:}}
    s3-bucket: ${APP_MEDIA_S3_BUCKET:${APP_MEDIA_R2_BUCKET:}}
    s3-access-key-id: ${APP_MEDIA_S3_ACCESS_KEY_ID:${APP_MEDIA_R2_ACCESS_KEY_ID:}}
    s3-secret-access-key: ${APP_MEDIA_S3_SECRET_ACCESS_KEY:${APP_MEDIA_R2_SECRET_ACCESS_KEY:}}
    s3-region: ${APP_MEDIA_S3_REGION:${APP_MEDIA_R2_REGION:}}
    s3-signed-url-ttl-seconds: ${APP_MEDIA_S3_SIGNED_URL_TTL_SECONDS:900}
  tdlight:
    enabled: ${APP_TDLIGHT_ENABLED:false}
    migration-enabled: ${APP_TDLIGHT_MIGRATION_ENABLED:false}
    entitlement-required: ${APP_TDLIGHT_ENTITLEMENT_REQUIRED:true}
    public-channel-client-mode: ${APP_TDLIGHT_PUBLIC_CHANNEL_CLIENT_MODE:STUB}
    backfill-history-enabled: ${APP_TDLIGHT_BACKFILL_HISTORY_ENABLED:true}
    public-channel-message-import-limit: ${APP_TDLIGHT_PUBLIC_CHANNEL_MESSAGE_IMPORT_LIMIT:500}
    imported-post-retention-days: ${APP_TDLIGHT_IMPORTED_POST_RETENTION_DAYS:7}
    media-import-enabled: ${APP_TDLIGHT_MEDIA_IMPORT_ENABLED:true}
    max-imported-media-bytes: ${APP_TDLIGHT_MAX_IMPORTED_MEDIA_BYTES:20971520}
    max-imported-video-duration-seconds: ${APP_TDLIGHT_MAX_IMPORTED_VIDEO_DURATION_SECONDS:180}
    dev-endpoints-enabled: ${APP_TDLIGHT_DEV_ENDPOINTS_ENABLED:false}
    session-encryption-key: ${APP_TDLIGHT_SESSION_ENCRYPTION_KEY:}
    library-path: ${APP_TDLIGHT_LIBRARY_PATH:}
    native-workdir: ${APP_TDLIGHT_NATIVE_WORKDIR:}
    database-directory: ${APP_TDLIGHT_DATABASE_DIRECTORY:}
    files-directory: ${APP_TDLIGHT_FILES_DIRECTORY:}
    api-id: ${APP_TDLIGHT_API_ID:}
    api-hash: ${APP_TDLIGHT_API_HASH:}
    system-language-code: ${APP_TDLIGHT_SYSTEM_LANGUAGE_CODE:en}
    device-model: ${APP_TDLIGHT_DEVICE_MODEL:Hermes Local Dev}
    application-version: ${APP_TDLIGHT_APPLICATION_VERSION:local-dev}

management:
  endpoints:
    web:
      exposure:
        include: health,info

telegram:
  enabled: ${TELEGRAM_ENABLED:false}
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  bot-username: ${TELEGRAM_BOT_USERNAME:}
  poll-timeout-seconds: ${TELEGRAM_POLL_TIMEOUT_SECONDS:25}

logging:
  level:
    com.vladislav.tgclone: INFO
